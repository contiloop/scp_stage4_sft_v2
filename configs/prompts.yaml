{
  "prompts": {
    "translation": {
      "version": "translation_v1",
      "src_lang_name": "English",
      "src_locale": "en-US",
      "tgt_lang_name": "Korean",
      "tgt_locale": "ko-KR",
      "template_seed": 42,
      "selection_seed_scope": "row_id",
      "templates": [
        "You are a professional {src_lang_name} ({src_locale}) to {tgt_lang_name} ({tgt_locale}) translator. Your goal is to accurately convey the meaning and nuances of the original {src_lang_name} text while adhering to {tgt_lang_name} grammar, vocabulary, and cultural sensitivities. Produce only the {tgt_lang_name} translation, without any additional explanations or commentary. Please translate the following {src_lang_name} text into {tgt_lang_name}: {src}",
        "Translate the following text from {src_lang_name} to {tgt_lang_name}: {src}",
        "What does this sentence mean in {tgt_lang_name} from {src_lang_name}: {src}",
        "How do you translate this sentence into {tgt_lang_name} from {src_lang_name}: {src}",
        "Translate the following text to {tgt_lang_name}: {src}"
      ]
    },
    "sft": {
      "version": "sft_translation_v1",
      "instruction_template": "### Instruction:\nTranslate the English source into Korean.\n\n### Source:\n{source}\n\n",
      "response_template": "### Response:\n"
    },
    "teacher_correction": {
      "version": "teacher_correction_v1",
      "system_template": "You are a professional English-to-Korean translator. Your primary specialization is finance, economics, and market commentary, but you also handle general business, technology, science, and news content with publication-grade Korean.",
      "user_template": "Given SOURCE and DRAFT, produce the best final Korean translation.\n\nBefore translating, silently consider:\n- Is this finance/market content, or general business/tech/news/scientific text? Adjust register accordingly.\n- If finance: what kind of source? (sell-side analyst note, earnings call, news article, regulatory filing, IR statement, macro commentary)\n- Who likely wrote it and for whom? (equity analyst to institutional clients, journalist to general financial readers, corporate IR to shareholders, etc.)\n- What is the dominant register and sub-domain when applicable?\n    - Asset class: equities / fixed income / macro / FX / commodities / M&A / earnings\n    - Industry sector (for equity-related text): semiconductors, IT/software, biotech/pharma, steel/materials, automotive, energy, finance/banks, consumer, real estate, etc.\n- If the text is clearly NOT finance (e.g., general tech tutorial, scientific abstract, lifestyle news), translate in the appropriate natural Korean style for that domain.\n\nUse these inferences to pick the appropriate Korean phrasing, formality, and technical vocabulary. Do NOT include any of this analysis in your output.\n\nRewrite policy:\n- no_change: DRAFT is already accurate and natural.\n- minor_edit: only small wording or fluency fixes are needed.\n- major_edit: substantial edits are needed, but DRAFT still provides useful structure.\n- rewrite: DRAFT quality is poor (meaning distortion, omission, hallucination, or severe unnaturalness). In this case, ignore DRAFT phrasing and re-translate from SOURCE from scratch.\n- invalid: SOURCE is not translatable or invalid. Line 2+ should contain a short Korean reason.\n\nThen follow these rules strictly:\n1) Output format:\n   - Line 1: one label in [no_change, minor_edit, major_edit, rewrite, invalid]\n   - Line 2+: final Korean translation only (or short Korean reason only when label is invalid)\n   - No preface, no explanation, no markdown, no quotes, no prefixes.\n2) Numbers & units: Preserve all numeric values, decimals, percentages (%), basis points (bps), currency symbols ($, ¥, €, ₩), and date formats exactly as written. Do not round or reformat.\n3) Proper nouns: Keep company names, person names, ticker symbols, and indices in their original form unless a widely-used Korean name exists.\n4) Acronyms: Keep English acronyms as-is (GDP, PCE, FOMC, CPI, AI, GPU, mRNA, etc.). Do NOT introduce a Korean gloss in parentheses unless the source already contains one.\n5) Parentheticals: If the source has parenthetical expressions, keep them in parentheses in the same position.\n6) Faithfulness: Translate the full meaning. Do not summarize, omit, or add information.\n\n[SOURCE]\n{source}\n\n[METADATA]\n{metadata_json}\n\n[DRAFT]\n{student}\n",
      "metadata": {
        "include": true,
        "render_format": "json",
        "allowed_fields": ["dataset", "document_type", "text_role", "title"]
      }
    }
  }
}
