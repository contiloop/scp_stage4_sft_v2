{
  "training": {
    "runtime": {
      "mode": "subprocess",
      "subprocess": {
        "collapse_command": [
          "torchrun",
          "--nproc_per_node=4",
          "-m",
          "scp_stage4.pipeline.workers.training_worker"
        ],
        "unload_command": [
          "torchrun",
          "--nproc_per_node=1",
          "-m",
          "scp_stage4.pipeline.workers.training_worker"
        ],
        "update_command": [
          "torchrun",
          "--nproc_per_node=4",
          "-m",
          "scp_stage4.pipeline.workers.training_worker"
        ]
      }
    },
    "collapse_lora": {
      "num_train_epochs": 0.1,
      "batching": {
        "per_device_train_batch_size": 16,
        "gradient_accumulation_steps": 2
      }
    },
    "base_update": {
      "batching": {
        "per_device_train_batch_size": 4,
        "gradient_accumulation_steps": 8
      }
    }
  }
}
